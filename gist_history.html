<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>gist Term History</title>
<style>
  :root {
    --bg: #fafafa; --fg: #222; --muted: #666; --border: #e0e0e0;
    --accent: #2a6099;
    --present: #90caf9; --absent: #ddd;
    --added: #4caf50; --removed: #e53935; --changed: #fbc02d;
    --row-hover: #f0f4fa; --row-open: #eef4fb;
    --panel-bg: #fffbe6; --panel-border: #e6d77a;
  }
  * { box-sizing: border-box; }
  body { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         margin: 0; color: var(--fg); background: var(--bg); }
  header { padding: 16px 24px; background: #fff; border-bottom: 1px solid var(--border);
           position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0 0 8px 0; font-size: 20px; }
  .summary { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .summary b { color: var(--fg); }
  .controls { display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: center; }
  .controls input[type=search] {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
    min-width: 220px; font: inherit;
  }
  .controls label { display: flex; align-items: center; gap: 4px; font-size: 13px;
                    color: var(--muted); cursor: pointer; user-select: none; }
  .controls select { padding: 5px 8px; font: inherit; border: 1px solid var(--border);
                     border-radius: 4px; }
  .result-count { margin-left: auto; font-size: 13px; color: var(--muted); }

  main { padding: 0 24px 40px; }

  /* Floating overlay pinned below the sticky header — always on-screen when open. */
  .release-panel { position: fixed; left: 0; right: 0; z-index: 20;
                   padding: 14px 24px; background: var(--panel-bg);
                   border-bottom: 2px solid var(--panel-border);
                   box-shadow: 0 4px 12px rgba(0,0,0,.08);
                   max-height: 50vh; overflow-y: auto; }
  @keyframes release-flash {
    0%   { background: #fff176; }
    100% { background: var(--panel-bg); }
  }
  .release-panel.flash { animation: release-flash .45s ease-out; }
  .release-panel h2 { margin: 0 0 6px 0; font-size: 16px; }
  .release-panel .meta { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .release-panel .meta code { background: #fff; padding: 1px 5px; border-radius: 3px; }
  .release-panel .close { position: absolute; top: 8px; right: 12px; background: transparent;
                          border: none; font-size: 18px; cursor: pointer; color: var(--muted);
                          line-height: 1; padding: 4px 8px; }
  .release-panel .close:hover { color: var(--fg); }
  .release-panel .groups { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .release-panel .group h3 { margin: 0 0 6px 0; font-size: 12px; text-transform: uppercase;
                             letter-spacing: .05em; color: var(--muted); }
  .release-panel .group ul { margin: 0; padding: 0 0 0 18px; max-height: 220px;
                              overflow: auto; font-family: "SF Mono", Consolas, monospace;
                              font-size: 12px; }
  .release-panel .group li { margin: 1px 0; }
  .release-panel .group.empty-group { opacity: .5; }

  table { width: 100%; border-collapse: collapse; margin-top: 16px; background: #fff;
          border: 1px solid var(--border); border-radius: 6px;
          table-layout: fixed; }
  col.col-name { width: 160px; }
  col.col-type { width: 180px; }
  col.col-ver  { width: 70px; }
  thead th { background: #f2f2f2; text-align: left; padding: 8px 12px; font-size: 12px;
             text-transform: uppercase; color: var(--muted); letter-spacing: .05em;
             border-bottom: 1px solid var(--border); user-select: none; vertical-align: bottom;
             position: sticky; z-index: 4; }
  thead th.sortable { cursor: pointer; }
  thead tr.version-axis th { background: #fff; padding: 0 12px 8px; border-bottom: 1px solid var(--border); }
  .version-labels { display: flex; gap: 1px; height: 52px; align-items: flex-end; }
  .vlabel { flex: 1; min-width: 6px; font-family: "SF Mono", Consolas, monospace;
            font-size: 10px; color: var(--muted); text-transform: none;
            letter-spacing: 0; cursor: pointer; position: relative;
            writing-mode: vertical-rl; transform: rotate(180deg); text-align: right;
            padding-top: 2px; white-space: nowrap; overflow: hidden; }
  .vlabel:hover { color: var(--accent); }
  .vlabel.active { color: var(--accent); font-weight: 700; }

  tbody tr { border-top: 1px solid var(--border); cursor: pointer; }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.open { background: var(--row-open); }
  tbody td { padding: 8px 12px; vertical-align: middle; }
  td.name { font-family: "SF Mono", Consolas, monospace; font-weight: 600;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.types { color: var(--muted); font-size: 12px; }
  td.types code { background: #eee; padding: 1px 5px; border-radius: 3px; font-size: 11px; }
  td.ver { font-family: "SF Mono", Consolas, monospace; color: var(--muted); font-size: 12px; }
  .vlink { cursor: pointer; color: var(--accent); text-decoration: none;
           border-bottom: 1px dotted var(--accent); }
  .vlink:hover { color: #174371; border-bottom-style: solid; }
  td.timeline-cell { padding: 0 12px; }

  .timeline-wrap { max-width: 500px; }
  .timeline { display: flex; gap: 1px; height: 20px; }
  .cell { flex: 1; min-width: 6px; background: var(--absent); position: relative; cursor: pointer; }
  .cell.present { background: var(--present); }
  .cell.added { background: var(--added); }
  .cell.removed { background: var(--removed); }
  .cell.changed { background: var(--changed); }

  .details { padding: 12px 16px 18px 16px; background: #fff; font-size: 13px; }
  .details h3 { margin: 8px 0 6px 0; font-size: 12px; text-transform: uppercase;
                letter-spacing: .05em; color: var(--muted); }
  .details ul { margin: 0 0 8px 0; padding: 0 0 0 18px; }
  .details li { margin: 2px 0; }
  .details code { background: #eee; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .ev-added::before    { content: "+ "; color: var(--added); font-weight: bold; }
  .ev-removed::before  { content: "− "; color: var(--removed); font-weight: bold; }
  .ev-type_changed::before { content: "~ "; color: var(--changed); font-weight: bold; }

  .legend { display: flex; gap: 16px; font-size: 12px; color: var(--muted); margin-top: 8px; }
  .legend .swatch { display: inline-block; width: 12px; height: 12px; vertical-align: middle;
                    margin-right: 4px; border-radius: 2px; }
  .empty { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>gist Term History</h1>
  <div class="summary" id="summary"></div>
  <div class="controls">
    <input type="search" id="q" placeholder="Search term name…" autofocus>
    <label>From
      <select id="fromVer"></select>
    </label>
    <label>To
      <select id="toVer"></select>
    </label>
    <label><input type="checkbox" id="inRangeOnly" checked> Only terms present in range</label>
    <label><input type="checkbox" id="latestOnly"> Only present in latest</label>
    <label><input type="checkbox" id="everRemoved"> Ever removed (anywhere)</label>
    <label>Sort by
      <select id="sortKey">
        <option value="type" selected>Type</option>
        <option value="name">Name</option>
        <option value="first">First seen</option>
        <option value="last">Last seen</option>
        <option value="lifetime">Lifetime</option>
      </select>
    </label>
    <div class="result-count" id="count"></div>
  </div>
  <div class="legend">
    <span><span class="swatch" style="background:var(--present)"></span>present</span>
    <span><span class="swatch" style="background:var(--added)"></span>added</span>
    <span><span class="swatch" style="background:var(--removed)"></span>removed</span>
    <span><span class="swatch" style="background:var(--changed)"></span>type changed</span>
    <span><span class="swatch" style="background:var(--absent)"></span>absent</span>
    <span style="margin-left:auto">Click a version label or cell for release details.</span>
  </div>
</header>
<div id="releasePanel" class="release-panel" hidden></div>
<main>
  <table id="grid">
    <colgroup>
      <col class="col-name">
      <col class="col-type">
      <col class="col-ver">
      <col class="col-ver">
      <col>
    </colgroup>
    <thead>
      <tr>
        <th class="sortable" data-sort="name">Term</th>
        <th title="Entity type(s) in the last version where this term appeared">Type <span style="font-weight:normal;text-transform:none">(at last seen)</span></th>
        <th class="sortable" data-sort="first">First</th>
        <th class="sortable" data-sort="last">Last</th>
        <th>Timeline</th>
      </tr>
      <tr class="version-axis">
        <th colspan="4"></th>
        <th><div class="timeline-wrap"><div class="version-labels" id="versionLabels"></div></div></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">No terms match the current filters.</div>
</main>

const versions = DATA.versions;
const vIndex = new Map(versions.map((v, i) => [v.v, i]));
const latestV = versions[versions.length - 1].v;

// Sort order for the Type dropdown: Class, ObjectProperty, DatatypeProperty,
// NamedIndividual, then anything else alphabetically.
const TYPE_ORDER = {
  "owl:Class": 0,
  "owl:ObjectProperty": 1,
  "owl:DatatypeProperty": 2,
  "owl:NamedIndividual": 3,
};
function typeRank(types) {
  if (!types || !types.length) return [99, ""];
  const ranked = types.map(t => [TYPE_ORDER[t] ?? 50, t]);
  ranked.sort((a, b) => a[0] - b[0] || a[1].localeCompare(b[1]));
  return ranked[0];
}
function cmpType(a, b) {
  const ra = typeRank(a.t), rb = typeRank(b.t);
  return ra[0] - rb[0] || ra[1].localeCompare(rb[1]) || a.n.localeCompare(b.n);
}

// Bucket events by version for the release panel
const eventsByVersion = {};
for (const t of DATA.terms) {
  for (const e of t.ev) {
    const b = eventsByVersion[e.version] ||
              (eventsByVersion[e.version] = { added: [], removed: [], type_changed: [] });
    b[e.event].push({
      n: t.n, types: e.entity_types || [],
      prevTypes: e.previous_entity_types || [],
    });
  }
}

// Precompute per-term state + convenience flags
for (const t of DATA.terms) {
  t._state = new Array(versions.length).fill("absent");
  const present = new Set(t.pv);
  versions.forEach((v, i) => { if (present.has(v.v)) t._state[i] = "present"; });
  for (const e of t.ev) {
    const i = vIndex.get(e.version);
    if (i === undefined) continue;
    if (e.event === "added") t._state[i] = "added";
    else if (e.event === "removed") t._state[i] = "removed";
    else if (e.event === "type_changed") t._state[i] = "changed";
  }
  t._lifetime = vIndex.get(t.ls) - vIndex.get(t.fs) + 1;
  t._inLatest = t.ls === latestV
                && t._state[versions.length - 1] !== "removed"
                && t._state[versions.length - 1] !== "absent";
  t._everRemoved = t.ev.some(e => e.event === "removed");
}

const el = id => document.getElementById(id);
const rowsEl = el("rows"), countEl = el("count"), emptyEl = el("empty");
const q = el("q"), latestOnly = el("latestOnly"), everRemoved = el("everRemoved");
const sortKey = el("sortKey"), inRangeOnly = el("inRangeOnly");
const fromVer = el("fromVer"), toVer = el("toVer");
const releasePanel = el("releasePanel"), versionLabels = el("versionLabels");

const fmtTypes = ts => (ts && ts.length)
  ? ts.map(t => `<code>${t}</code>`).join(" ")
  : `<span style="color:#aaa">—</span>`;

// Populate From/To with all versions; default 9.0.0 → latest
for (const v of versions) {
  const o1 = new Option(`v${v.v}`, v.v), o2 = new Option(`v${v.v}`, v.v);
  fromVer.add(o1); toVer.add(o2);
}
fromVer.value = versions[0].v;
toVer.value = latestV;

function getRange() {
  let lo = vIndex.get(fromVer.value), hi = vIndex.get(toVer.value);
  if (lo > hi) [lo, hi] = [hi, lo];
  return { lo, hi, visible: versions.slice(lo, hi + 1) };
}

function renderVersionLabels(range) {
  versionLabels.innerHTML = range.visible.map(v =>
    `<div class="vlabel" data-version="${v.v}" title="v${v.v} (${v.d})">${v.v}</div>`
  ).join("");
}

let openRelease = null;

function showRelease(v) {
  openRelease = v;
  const vd = versions[vIndex.get(v)];
  const prevIdx = vIndex.get(v) - 1;
  const prev = prevIdx >= 0 ? versions[prevIdx] : null;
  const b = eventsByVersion[v] || { added: [], removed: [], type_changed: [] };

  const group = (label, items, renderItem, klass) => {
    const cls = items.length ? "" : "empty-group";
    return `
      <div class="group ${cls} ${klass}">
        <h3>${label} (${items.length})</h3>
        <ul>${items.length ? items.map(renderItem).join("") : "<li style='list-style:none;color:#aaa;font-style:italic'>none</li>"}</ul>
      </div>`;
  };
  const sortByName = arr => [...arr].sort((a, b) => a.n.localeCompare(b.n));
  const itemLine = i => `<li>${i.n} <span style="color:#888">${(i.types || []).join(", ")}</span></li>`;
  const typeChangeLine = i => `<li>${i.n}: ${i.prevTypes.join(", ")} → ${i.types.join(", ")}</li>`;

  releasePanel.innerHTML = `
    <button class="close" aria-label="Close">×</button>
    <h2>v${vd.v} — ${vd.d}</h2>
    <div class="meta">
      Namespace: <code>${vd.ns}</code> · Total terms: <b>${vd.count}</b>
      ${prev ? `· Changes vs v${prev.v}: <b style="color:var(--added)">+${b.added.length}</b> added, <b style="color:var(--removed)">−${b.removed.length}</b> removed, <b style="color:#a88900">~${b.type_changed.length}</b> type-changed` : `· <i>initial version</i>`}
    </div>
    <div class="groups">
      ${group("Added", sortByName(b.added), itemLine, "ev-added-group")}
      ${group("Removed", sortByName(b.removed), itemLine, "ev-removed-group")}
      ${group("Type changed", sortByName(b.type_changed), typeChangeLine, "ev-changed-group")}
    </div>`;
  releasePanel.hidden = false;
  positionReleasePanel();
  releasePanel.querySelector(".close").addEventListener("click", closeRelease);
  updateActiveVersionLabel();
  // Flash briefly so a click on a different version is visibly registered,
  // even when the panel is already open.
  releasePanel.classList.remove("flash");
  void releasePanel.offsetWidth;
  releasePanel.classList.add("flash");
}

function positionReleasePanel() {
  const hdr = document.querySelector("header");
  releasePanel.style.top = hdr.getBoundingClientRect().bottom + "px";
}
window.addEventListener("resize", () => { if (!releasePanel.hidden) positionReleasePanel(); });
window.addEventListener("scroll", () => { if (!releasePanel.hidden) positionReleasePanel(); });

function updateStickyTheadTop() {
  const hdr = document.querySelector("header");
  const row1 = document.querySelector("thead tr:first-child");
  const hh = hdr.offsetHeight;
  const rh = row1.offsetHeight;
  row1.querySelectorAll("th").forEach(th => { th.style.top = hh + "px"; });
  document.querySelectorAll("thead tr.version-axis th").forEach(th => { th.style.top = (hh + rh) + "px"; });
}
window.addEventListener("resize", updateStickyTheadTop);

function closeRelease() {
  openRelease = null;
  releasePanel.hidden = true;
  updateActiveVersionLabel();
}

function updateActiveVersionLabel() {
  versionLabels.querySelectorAll(".vlabel").forEach(n => {
    n.classList.toggle("active", n.dataset.version === openRelease);
  });
}

versionLabels.addEventListener("click", ev => {
  const lbl = ev.target.closest(".vlabel");
  if (lbl) showRelease(lbl.dataset.version);
});

function render() {
  const needle = q.value.trim().toLowerCase();
  const range = getRange();
  const inRange = inRangeOnly.checked;
  const latestOnlyV = latestOnly.checked;
  const everRemovedV = everRemoved.checked;

  let list = DATA.terms.filter(t => {
    if (needle && !t.n.toLowerCase().includes(needle)) return false;
    if (latestOnlyV && !t._inLatest) return false;
    if (everRemovedV && !t._everRemoved) return false;
    if (inRange) {
      // keep only terms present in at least one version in [lo..hi]
      let any = false;
      for (let i = range.lo; i <= range.hi; i++) {
        const s = t._state[i];
        if (s === "present" || s === "added" || s === "changed") { any = true; break; }
      }
      if (!any) return false;
    }
    return true;
  });

  const sk = sortKey.value;
  const cmp = {
    type: cmpType,
    name: (a, b) => a.n.localeCompare(b.n),
    first: (a, b) => vIndex.get(a.fs) - vIndex.get(b.fs) || a.n.localeCompare(b.n),
    last:  (a, b) => vIndex.get(b.ls) - vIndex.get(a.ls) || a.n.localeCompare(b.n),
    lifetime: (a, b) => b._lifetime - a._lifetime || a.n.localeCompare(b.n),
  }[sk];
  list.sort(cmp);

  renderVersionLabels(range);
  rowsEl.innerHTML = "";
  for (const t of list) rowsEl.appendChild(buildRow(t, range));

  countEl.textContent = `${list.length} of ${DATA.terms.length} terms`;
  emptyEl.style.display = list.length ? "none" : "block";
  updateActiveVersionLabel();
}

function buildRow(t, range) {
  const tr = document.createElement("tr");
  tr.className = "term-row";
  const cells = range.visible.map((v, idx) => {
    const i = range.lo + idx;
    const s = t._state[i];
    const lbl = `v${v.v} (${v.d}) — ${s}`;
    return `<div class="cell ${s}" data-version="${v.v}" title="${lbl}"></div>`;
  }).join("");
  tr.innerHTML = `
    <td class="name" title="${t.n}">${t.n}</td>
    <td class="types">${fmtTypes(t.t)}</td>
    <td class="ver"><span class="vlink" data-version="${t.fs}">${t.fs}</span></td>
    <td class="ver"><span class="vlink" data-version="${t.ls}">${t.ls}</span></td>
    <td class="timeline-cell"><div class="timeline-wrap"><div class="timeline">${cells}</div></div></td>`;
  tr.addEventListener("click", ev => {
    const vlinkEl = ev.target.closest(".vlink");
    if (vlinkEl) { ev.stopPropagation(); showRelease(vlinkEl.dataset.version); return; }
    const cellEl = ev.target.closest(".cell");
    if (cellEl) { ev.stopPropagation(); showRelease(cellEl.dataset.version); return; }
    toggleDetails(tr, t);
  });
  return tr;
}

function toggleDetails(tr, t) {
  const existing = tr.nextSibling;
  if (existing && existing.classList && existing.classList.contains("details-row")) {
    existing.remove();
    tr.classList.remove("open");
    return;
  }
  tr.classList.add("open");
  const dr = document.createElement("tr");
  dr.className = "details-row";
  dr.innerHTML = `<td colspan="5"><div class="details">${renderDetails(t)}</div></td>`;
  tr.parentNode.insertBefore(dr, tr.nextSibling);
}

function renderDetails(t) {
  const uh = t.uh.map(h =>
    `<li><code>${h.uri}</code> <span style="color:#888">(${h.first_version}${h.first_version === h.last_version ? "" : " – " + h.last_version})</span></li>`
  ).join("");
  const evs = t.ev.map(e => {
    let body = `<span class="ev-${e.event}"></span>v${e.version} (${e.date}) — ${e.event}`;
    if (e.event === "type_changed") {
      body += ` · ${fmtTypes(e.previous_entity_types || [])} → ${fmtTypes(e.entity_types)}`;
    } else if (e.entity_types && e.entity_types.length) {
      body += ` · ${fmtTypes(e.entity_types)}`;
    }
    return `<li>${body}</li>`;
  }).join("");
  return `
    <h3>URI history</h3><ul>${uh}</ul>
    <h3>Events</h3><ul>${evs}</ul>
    <h3>Present in ${t.pv.length} versions</h3>
    <div style="color:#666;font-family:monospace;font-size:12px">${t.pv.join(", ")}</div>
  `;
}

// Summary
const s = DATA.summary;
el("summary").innerHTML =
  `<b>${s.versions_processed}</b> releases · ` +
  `<b>${s.first_version}</b> → <b>${s.latest_version}</b> · ` +
  `<b>${s.distinct_terms_ever_seen}</b> distinct terms ever · ` +
  `<b>${s.terms_present_in_latest}</b> present in latest · ` +
  `<b>${s.total_events}</b> events ` +
  `(${s.events_by_type.added || 0} added, ${s.events_by_type.removed || 0} removed, ` +
  `${s.events_by_type.type_changed || 0} type-changed)`;

[q, latestOnly, everRemoved, sortKey, inRangeOnly, fromVer, toVer].forEach(el =>
  el.addEventListener("input", render));
document.querySelectorAll("thead th.sortable").forEach(th => {
  th.addEventListener("click", () => { sortKey.value = th.dataset.sort; render(); });
});

render();
requestAnimationFrame(updateStickyTheadTop);
</script>
</body>
</html>
